<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="組織架構圖分析系統 - 設定新密碼" />
  <title>設定新密碼 - 組織架構圖分析系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./login.css" />
  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
    }
  }
  </script>
</head>
<body>
  <div class="login-page">
    <div class="login-particle"></div>
    <div class="login-particle"></div>
    <div class="login-particle"></div>

    <div class="login-card-wrapper">
      <div class="login-card">
        <div class="login-brand login-brand-compact">
          <div class="login-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 12h6"/>
              <path d="M12 9v6"/>
              <path d="M7 10V8a5 5 0 0 1 10 0v2"/>
              <rect x="4" y="10" width="16" height="10" rx="2"/>
            </svg>
          </div>
          <h1 class="login-title">設定新密碼</h1>
          <p class="login-subtitle" id="resetSubtitle">驗證連結中，請稍候。</p>
        </div>

        <div class="auth-loading-inline" id="resetLoading">
          <span class="spinner"></span>
          <span>正在確認重設連結...</span>
        </div>

        <div class="login-error" id="resetError" role="alert">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/>
          </svg>
          <span id="resetErrorText">重設連結已失效，請重新申請。</span>
        </div>

        <div class="login-success" id="resetSuccess" aria-live="polite">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
          <div>
            <div class="auth-status-title">密碼已更新</div>
            <div class="auth-status-text">你現在可以使用新密碼重新登入系統。</div>
          </div>
        </div>

        <form class="login-form" id="resetPasswordForm" hidden>
          <div class="form-group">
            <label class="form-label" for="newPassword">新密碼</label>
            <div class="password-input-group">
              <input
                type="password"
                id="newPassword"
                class="form-input"
                placeholder="至少 8 個字元"
                autocomplete="new-password"
                required
              />
              <button type="button" class="password-toggle" data-target="newPassword" aria-label="顯示或隱藏密碼">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M2.06 12.35a1 1 0 0 1 0-.7C3.42 7.91 7.36 5 12 5c4.64 0 8.58 2.91 9.94 6.65a1 1 0 0 1 0 .7C20.58 16.09 16.64 19 12 19c-4.64 0-8.58-2.91-9.94-6.65Z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirmPassword">確認新密碼</label>
            <div class="password-input-group">
              <input
                type="password"
                id="confirmPassword"
                class="form-input"
                placeholder="再次輸入新密碼"
                autocomplete="new-password"
                required
              />
              <button type="button" class="password-toggle" data-target="confirmPassword" aria-label="顯示或隱藏密碼">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M2.06 12.35a1 1 0 0 1 0-.7C3.42 7.91 7.36 5 12 5c4.64 0 8.58 2.91 9.94 6.65a1 1 0 0 1 0 .7C20.58 16.09 16.64 19 12 19c-4.64 0-8.58-2.91-9.94-6.65Z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <p class="form-hint">建議使用至少 8 個字元，並混合大小寫與數字。</p>
          </div>
          <button type="submit" class="btn-login" id="btnUpdatePassword">
            <span class="btn-text">更新密碼</span>
            <span class="spinner-login"></span>
          </button>
        </form>

        <div class="auth-footer-links">
          <a class="auth-text-link" href="./login.html">返回登入</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./reset-password.js"></script>
</body>
</html>
