<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Transactions</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
    button { padding: 10px 20px; font-size: 16px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #progress-container { margin-top: 20px; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; height: 24px; background: #f8fafc; display: none; }
    #progress-bar { height: 100%; background: #10b981; width: 0%; transition: width 0.3s; }
    #log { margin-top: 20px; padding: 10px; background: #f1f5f9; border-radius: 6px; font-family: monospace; max-height: 300px; overflow-y: auto; font-size: 14px; }
  </style>
</head>
<body>
  <h1>ETL: 同步訂單資料至 Supabase</h1>
  <p>分批將 <b>24,013</b> 筆訂單明細上傳。這不會覆蓋原有明細，而是附加。<br><strong>⚠️ 注意：請勿重複點擊開始，以免產生重複訂單。</strong></p>

  <button id="startBtn">開始同步 (Start Sync)</button>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>
  
  <div id="log">等待開始...</div>

  <script>
    const SUPABASE_URL = 'https://lmceenngavsphblshlqt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_P3tJpGBfnJD5ejDqP3d2mQ_hNe7XzJ6'; // Anon Key
    const BATCH_SIZE = 500;
    
    const btn = document.getElementById('startBtn');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const logDiv = document.getElementById('log');

    function log(msg) {
      logDiv.innerHTML += `<div>${new Date().toLocaleTimeString()} - ${msg}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function uploadBatch(batch, attempt = 1) {
      const resp = await fetch(`${SUPABASE_URL}/rest/v1/transactions`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(batch)
      });
      
      if (!resp.ok) {
        if (attempt < 3) {
          log(`⚠️ 批次上傳失敗 (${resp.status})，2秒後重試...`);
          await new Promise(r => setTimeout(r, 2000));
          return uploadBatch(batch, attempt + 1);
        }
        const err = await resp.text();
        throw new Error(`HTTP ${resp.status}: ${err}`);
      }
      return true;
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      progressContainer.style.display = 'block';
      log(`📥 正在從本地 transactions.json 載入資料...`);
      
      try {
        const res = await fetch('/transactions.json');
        if (!res.ok) throw new Error('Failed to load transactions.json');
        const transactions = await res.json();
        const total = transactions.length;
        
        log(`✅ 成功載入 ${total.toLocaleString()} 筆訂單。開始上傳...`);
        
        let uploaded = 0;
        
        for (let i = 0; i < total; i += BATCH_SIZE) {
          const batch = transactions.slice(i, i + BATCH_SIZE);
          await uploadBatch(batch);
          
          uploaded += batch.length;
          const percent = Math.round((uploaded / total) * 100);
          progressBar.style.width = `${percent}%`;
          log(`🚀 上傳進度：${uploaded.toLocaleString()} / ${total.toLocaleString()} (${percent}%)`);
        }
        
        log(`🎉 所有訂單上傳完畢！`);
      } catch (err) {
        log(`❌ 錯誤: ${err.message}`);
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
