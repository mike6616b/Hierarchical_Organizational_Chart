<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="組織架構圖分析系統 - 登入" />
  <title>登入 - 組織架構圖分析系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./login.css" />
  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
    }
  }
  </script>
</head>
<body>
  <div class="login-page">
    <!-- Decorative particles -->
    <div class="login-particle"></div>
    <div class="login-particle"></div>
    <div class="login-particle"></div>

    <!-- Login Card with Border Beam -->
    <div class="login-card-wrapper">
      <div class="login-card">
        <!-- Branding -->
        <div class="login-brand">
          <div class="login-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="7" r="4"/>
              <path d="M5.5 21a8.38 8.38 0 0 1 13 0"/>
              <path d="M12 11v4"/>
              <path d="M8 18l-3 3"/>
              <path d="M16 18l3 3"/>
            </svg>
          </div>
          <h1 class="login-title">組織架構圖分析系統</h1>
          <p class="login-subtitle">請登入以繼續使用</p>
        </div>

        <!-- Error Message -->
        <div class="login-error" id="loginError">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/>
          </svg>
          <span id="loginErrorText">帳號或密碼錯誤</span>
        </div>

        <!-- Form -->
        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label class="form-label" for="loginAccount">登入帳號</label>
            <input
              type="text"
              id="loginAccount"
              class="form-input"
              placeholder="請輸入帳號"
              autocomplete="username"
              required
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="loginPassword">密碼</label>
            <input
              type="password"
              id="loginPassword"
              class="form-input"
              placeholder="輸入密碼"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit" class="btn-login" id="btnLogin">
            <span class="btn-text">登入</span>
            <span class="spinner-login"></span>
          </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
          <p class="login-footer-text">僅限授權人員使用</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.__APP_CONFIG__ = {
      SUPABASE_URL: 'https://lmceenngavsphblshlqt.supabase.co',
      SUPABASE_ANON_KEY: 'sb_publishable_P3tJpGBfnJD5ejDqP3d2mQ_hNe7XzJ6',
    }
  </script>
  <script type="module" src="./login.js"></script>
</body>
</html>
