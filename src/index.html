<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="組織架構圖分析系統 - 檢視組織關係樹、業績統計與發展趨勢" />
  <title>組織架構圖分析系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header" id="appHeader">
      <div class="header-left">
        <h1 class="app-title">組織架構圖</h1>
        <p class="app-subtitle">組織關係與業績分析</p>
      </div>
      <div class="header-right">
        <div class="search-group" id="searchGroup">
          <div class="search-input-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="搜尋會員編號、姓名或公司名稱..."
              autocomplete="off"
            />
            <button id="btnClearSearch" class="btn-icon btn-clear-search" title="清除" style="display:none">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <div id="searchResults" class="search-results" style="display:none"></div>
        </div>
        <div class="date-group">
          <input type="date" id="startDate" class="date-input" />
          <span class="date-sep">—</span>
          <input type="date" id="endDate" class="date-input" />
          <button id="btnApplyDate" class="btn btn-primary btn-sm">套用</button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
      <!-- Left: Canvas Tree -->
      <section class="tree-section" id="treeSection">
        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg viewBox="0 0 80 80" fill="none">
              <circle cx="40" cy="28" r="12" stroke="currentColor" stroke-width="2.5" fill="none" opacity="0.4"/>
              <path d="M40 40v12" stroke="currentColor" stroke-width="2.5" opacity="0.3"/>
              <circle cx="24" cy="60" r="8" stroke="currentColor" stroke-width="2" fill="none" opacity="0.25"/>
              <circle cx="56" cy="60" r="8" stroke="currentColor" stroke-width="2" fill="none" opacity="0.25"/>
              <path d="M40 52l-16 8M40 52l16 8" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
            </svg>
          </div>
          <h2 class="empty-title">搜尋會員以檢視組織架構</h2>
          <p class="empty-desc">輸入會員編號、姓名或公司名稱開始查詢</p>
        </div>

        <!-- Canvas (hidden until search) -->
        <canvas id="treeCanvas" style="display:none"></canvas>

        <!-- Zoom Controls -->
        <div class="zoom-controls" id="zoomControls" style="display:none">
          <button class="btn-icon" id="btnZoomIn" title="放大">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <button class="btn-icon" id="btnZoomOut" title="縮小">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
          </button>
          <button class="btn-icon" id="btnFitView" title="適合畫面">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
          </button>
        </div>

        <!-- Legend -->
        <div class="legend" id="legend" style="display:none">
          <div class="legend-item"><span class="legend-dot" style="background:var(--level-dealer)"></span>經銷商</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--level-senior)"></span>高級</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--level-mid)"></span>中級</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--level-junior)"></span>初級</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--level-general)"></span>一般</div>
          <div class="legend-item"><span class="legend-dot legend-dot-high"></span>高業績</div>
        </div>

        <!-- Breadcrumb Path -->
        <div class="breadcrumb" id="breadcrumb" style="display:none"></div>
      </section>

      <!-- Stats Bar (bottom) -->
      <section class="stats-bar" id="statsBar" style="display:none">
        <div class="stat-card">
          <span class="stat-value" id="statMembers">0</span>
          <span class="stat-label">組織人數</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="statOrders">0</span>
          <span class="stat-label">總訂單金額</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="statPickup">0</span>
          <span class="stat-label">總訂單數量</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="statHighPerf">0</span>
          <span class="stat-label">高業績</span>
        </div>
      </section>

      <!-- Detail Panel (Slide from Right) -->
      <aside class="detail-panel" id="detailPanel" style="transform: translateX(100%);">
        <div class="dp-header">
          <h2 class="dp-title">會員詳細資料</h2>
          <button class="btn-icon dp-close" id="btnDetailClose" title="關閉">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="dp-content" id="dpContent">
          <!-- Dynamically populated -->
        </div>
        <div class="dp-loading" id="dpLoading" style="display:none">
          <span class="spinner"></span> 載入中...
        </div>
      </aside>

    </main>
  </div>

  <script>
    // App Config (替代 .env)
    window.__APP_CONFIG__ = {
      SUPABASE_URL: 'https://lmceenngavsphblshlqt.supabase.co',
      SUPABASE_ANON_KEY: 'sb_publishable_P3tJpGBfnJD5ejDqP3d2mQ_hNe7XzJ6',
    }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
