<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="組織架構圖分析系統 - 忘記密碼" />
  <title>忘記密碼 - 組織架構圖分析系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./login.css" />
  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
    }
  }
  </script>
</head>
<body>
  <div class="login-page">
    <div class="login-particle"></div>
    <div class="login-particle"></div>
    <div class="login-particle"></div>

    <div class="login-card-wrapper">
      <div class="login-card">
        <div class="login-brand login-brand-compact">
          <div class="login-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 17v.01"/>
              <path d="M7 10V8a5 5 0 0 1 10 0v2"/>
              <rect x="4" y="10" width="16" height="10" rx="2"/>
            </svg>
          </div>
          <h1 class="login-title">重設密碼</h1>
          <p class="login-subtitle">輸入登入信箱，我們會寄送重設密碼連結給你。</p>
        </div>

        <div class="login-error" id="forgotError" role="alert">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/>
          </svg>
          <span id="forgotErrorText">無法送出重設信</span>
        </div>

        <div class="login-success" id="forgotSuccess" aria-live="polite">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
          <div>
            <div class="auth-status-title">重設信已送出</div>
            <div class="auth-status-text">請到你的信箱開啟重設密碼連結，再回到此系統設定新密碼。</div>
          </div>
        </div>

        <form class="login-form" id="forgotPasswordForm">
          <div class="form-group">
            <label class="form-label" for="resetEmail">登入信箱</label>
            <input
              type="email"
              id="resetEmail"
              class="form-input"
              placeholder="name@example.com"
              autocomplete="email"
              required
            />
            <p class="form-hint">如果你平常用短帳號登入，請輸入建立帳號時綁定的完整信箱。</p>
          </div>
          <button type="submit" class="btn-login" id="btnSendReset">
            <span class="btn-text">寄送重設連結</span>
            <span class="spinner-login"></span>
          </button>
        </form>

        <div class="auth-footer-links">
          <a class="auth-text-link" href="./login.html">返回登入</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./forgot-password.js"></script>
</body>
</html>
