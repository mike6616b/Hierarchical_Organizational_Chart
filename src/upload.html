<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Data Uploader</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
    button { padding: 10px 20px; font-size: 16px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #progress-container { margin-top: 20px; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; height: 24px; background: #f8fafc; display: none; }
    #progress-bar { height: 100%; background: #10b981; width: 0%; transition: width 0.3s; }
    #log { margin-top: 20px; padding: 10px; background: #f1f5f9; border-radius: 6px; font-family: monospace; max-height: 300px; overflow-y: auto; font-size: 14px; }
  </style>
</head>
<body>
  <h1>ETL: 同步資料至 Supabase</h1>
  <p>因為終端的 DNS 被阻擋，我們改用瀏覽器（前端）直接打 API 把 <b>115,514</b> 筆資料分批上傳到 Supabase。這大概需要幾分鐘的時間。</p>
  
  <div style="margin-bottom: 15px; background: #fffbeb; padding: 15px; border-radius: 6px; border: 1px solid #fcd34d;">
    <label for="startIndex" style="font-weight: bold; color: #b45309;">從第幾筆開始接續上傳？</label><br>
    <input type="number" id="startIndex" value="37000" style="padding: 8px; margin-top: 5px; width: 120px; font-size: 16px; border: 1px solid #d1d5db; border-radius: 4px;">
    <p style="margin: 5px 0 0 0; font-size: 14px; color: #92400e;">如果中斷了，請查看最後出現的進度數字填入這裡，以節省時間。</p>
  </div>

  <button id="startBtn">開始同步 (Start Sync)</button>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>
  
  <div id="log">等待開始...</div>

  <script>
    const SUPABASE_URL = 'https://lmceenngavsphblshlqt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_P3tJpGBfnJD5ejDqP3d2mQ_hNe7XzJ6'; // Anon Key
    const BATCH_SIZE = 250; // 降低批次大小防 timeout
    
    const btn = document.getElementById('startBtn');
    const startInput = document.getElementById('startIndex');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const logDiv = document.getElementById('log');

    function log(msg) {
      logDiv.innerHTML += `<div>${new Date().toLocaleTimeString()} - ${msg}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function uploadBatch(batch, attempt = 1) {
      const resp = await fetch(`${SUPABASE_URL}/rest/v1/members?on_conflict=member_no`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates'
        },
        body: JSON.stringify(batch)
      });
      
      if (!resp.ok) {
        if (attempt < 3) {
          log(`⚠️ 批次上傳失敗 (${resp.status})，2秒後重試...`);
          await new Promise(r => setTimeout(r, 2000));
          return uploadBatch(batch, attempt + 1);
        }
        const err = await resp.text();
        throw new Error(`HTTP ${resp.status}: ${err}`);
      }
      return true;
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      startInput.disabled = true;
      progressContainer.style.display = 'block';
      
      const startIndex = parseInt(startInput.value, 10) || 0;
      log(`📥 正在從本地 members.json 載入資料...`);
      
      try {
        const res = await fetch('/members.json');
        if (!res.ok) throw new Error('Failed to load members.json');
        const members = await res.json();
        const total = members.length;
        
        log(`✅ 成功載入，將從第 ${startIndex.toLocaleString()} 筆開始上傳至 ${total.toLocaleString()}`);
        
        let uploaded = startIndex;
        
        for (let i = startIndex; i < total; i += BATCH_SIZE) {
          const batch = members.slice(i, i + BATCH_SIZE);
          await uploadBatch(batch);
          
          uploaded += batch.length;
          const percent = Math.round((uploaded / total) * 100);
          progressBar.style.width = `${percent}%`;
          log(`🚀 上傳進度：${uploaded.toLocaleString()} / ${total.toLocaleString()} (${percent}%)`);
        }
        
        log('🎉 全部同步完成！你現在可以回到 localhost:8080 測試搜尋功能了。');
        
      } catch (err) {
        log(`❌ 發生錯誤：${err.message}`);
        btn.disabled = false;
        startInput.disabled = false;
      }
    });
  </script>
</body>
</html>
